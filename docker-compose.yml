services:
  api:
    build:
      context: .
      dockerfile: src/CloseExpAISolution.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=CloseExpAIDb;Username=postgres;Password=password;
    depends_on:
      db:
        condition: service_healthy
    # Optional: override AIService URL when AI runs in another container
    # - AIService__BaseUrl=http://ai-service:8000

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: CloseExpAIDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
